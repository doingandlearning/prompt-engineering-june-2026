<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deriving AI models</title>
<style>
  /* ── Design tokens ── */
  :root {
    --color-text-primary:      #1a1a18;
    --color-text-secondary:    #73726c;
    --color-border-tertiary:   rgba(0,0,0,0.15);
    --color-border-secondary:  rgba(0,0,0,0.30);
    --color-background-primary: #ffffff;

    /* Node colours (light mode) */
    --teal-fill:   #E1F5EE;
    --teal-stroke: #0F6E56;
    --teal-text:   #085041;

    --gray-fill:   #F1EFE8;
    --gray-stroke: #5F5E5A;
    --gray-text:   #2C2C2A;

    --coral-fill:  #FAECE7;
    --coral-stroke:#993C1D;
    --coral-text:  #4A1B0C;

    --red-arrow:   #E24B4A;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary:      #e8e6de;
      --color-text-secondary:    #9c9a92;
      --color-border-tertiary:   rgba(255,255,255,0.15);
      --color-border-secondary:  rgba(255,255,255,0.30);
      --color-background-primary: #1e1e1c;

      --teal-fill:   #085041;
      --teal-stroke: #9FE1CB;
      --teal-text:   #E1F5EE;

      --gray-fill:   #2C2C2A;
      --gray-stroke: #B4B2A9;
      --gray-text:   #F1EFE8;

      --coral-fill:  #4A1B0C;
      --coral-stroke:#F5C4B3;
      --coral-text:  #FAECE7;

      --red-arrow:   #F09595;
    }
  }

  body {
    font-family: system-ui, sans-serif;
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    padding: 24px;
    margin: 0;
  }

  /* ── Nav ── */
  #nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0 1rem;
  }
  #progress { display: flex; gap: 8px; align-items: center; }
  .step-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--color-border-secondary);
    display: inline-block; transition: background .3s;
  }
  .step-dot.active { background: var(--color-text-primary); }
  #step-label {
    font-size: 13px;
    color: var(--color-text-secondary);
    min-width: 200px;
    text-align: center;
    margin-top: 6px;
  }
  button {
    font-size: 13px; padding: 6px 16px; cursor: pointer;
    background: transparent;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 6px;
    color: var(--color-text-primary);
  }
  button:hover { background: var(--color-border-tertiary); }
  button:disabled { opacity: 0.3; cursor: default; }

  /* ── SVG text helpers ── */
  .t  { font-size: 14px; font-weight: 400; fill: var(--color-text-primary); font-family: inherit; }
  .ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); font-family: inherit; }
  .th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); font-family: inherit; }

  /* ── Coloured node classes ── */
  .c-teal  rect, .c-teal  circle { fill: var(--teal-fill);  stroke: var(--teal-stroke); }
  .c-teal  .th, .c-teal  .t      { fill: var(--teal-text); }
  .c-teal  .ts                    { fill: var(--teal-stroke); }

  .c-gray  rect, .c-gray  circle { fill: var(--gray-fill);  stroke: var(--gray-stroke); }
  .c-gray  .th, .c-gray  .t      { fill: var(--gray-text); }
  .c-gray  .ts                    { fill: var(--gray-stroke); }

  .c-coral rect, .c-coral circle { fill: var(--coral-fill); stroke: var(--coral-stroke); }
  .c-coral .th, .c-coral .t      { fill: var(--coral-text); }
  .c-coral .ts                    { fill: var(--coral-stroke); }

  /* ── Step fade ── */
  .fade-in { animation: fi .35s ease; }
  @keyframes fi { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<div id="nav-row">
  <button id="btn-prev" onclick="go(-1)" disabled>← Back</button>
  <div style="display:flex;flex-direction:column;align-items:center">
    <div id="progress"></div>
    <span id="step-label"></span>
  </div>
  <button id="btn-next" onclick="go(1)">Next →</button>
</div>

<svg id="diagram" width="100%" viewBox="0 0 680 460" role="img"
     xmlns="http://www.w3.org/2000/svg">
  <title>Deriving AI models</title>
  <desc>Step-through diagram: training loop then inference pipeline.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── STEP 0: loop border ── -->
  <g id="s0">
    <rect x="60" y="30" width="560" height="240" rx="20"
          fill="none" stroke="var(--color-border-secondary)"
          stroke-width="1.5" stroke-dasharray="6 4"/>
    <text class="ts" x="340" y="22" text-anchor="middle"
          dominant-baseline="central">Training loop</text>
  </g>

  <!-- ── STEP 1: training data label + arrow ── -->
  <g id="s1" opacity="0">
    <text class="ts" x="100" y="110" text-anchor="middle" dominant-baseline="central">Training</text>
    <text class="ts" x="100" y="125" text-anchor="middle" dominant-baseline="central">data set</text>
    <line x1="140" y1="117" x2="198" y2="117"
          stroke="var(--color-text-secondary)" stroke-width="1.5"
          marker-end="url(#arrow)"/>
  </g>

  <!-- ── STEP 2: Model training box + arrow out ── -->
  <g id="s2" opacity="0">
    <g class="c-teal">
      <rect x="200" y="88" width="160" height="58" rx="8" stroke-width="0.5"/>
      <text class="th" x="280" y="117" text-anchor="middle" dominant-baseline="central">Model training</text>
    </g>
    <line x1="360" y1="117" x2="418" y2="117"
          stroke="var(--color-text-secondary)" stroke-width="1.5"
          marker-end="url(#arrow)"/>
  </g>

  <!-- ── STEP 3: Model output box ── -->
  <g id="s3" opacity="0">
    <g class="c-gray">
      <rect x="420" y="88" width="120" height="58" rx="8" stroke-width="0.5"/>
      <text class="th" x="480" y="117" text-anchor="middle" dominant-baseline="central">Model</text>
    </g>
  </g>

  <!-- ── STEP 4: feedback arrow ──
       Model output (right) → down outside eval column → along bottom → up to "Model" input label
       Model box: x=420 w=120 → right edge x=540, centre y=117
       Model input label: x=100 y=200
  -->
  <g id="s4" opacity="0">
    <path d="M 540 117
             L 598 117
             L 598 252
             L 72 252
             L 72 200
             L 80 200"
          fill="none"
          stroke="var(--red-arrow)"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          marker-end="url(#arrow)"/>
  </g>

  <!-- ── STEP 5: test data + model labels ── -->
  <g id="s5" opacity="0">
    <text class="ts" x="100" y="178" text-anchor="middle" dominant-baseline="central">Test data set</text>
    <line x1="140" y1="178" x2="198" y2="185"
          stroke="var(--color-text-secondary)" stroke-width="1.5"
          marker-end="url(#arrow)"/>
    <text class="ts" x="100" y="200" text-anchor="middle" dominant-baseline="central">Model</text>
    <line x1="140" y1="200" x2="198" y2="196"
          stroke="var(--color-text-secondary)" stroke-width="1.5"
          marker-end="url(#arrow)"/>
  </g>

  <!-- ── STEP 6: Model evaluation box + arrow out ── -->
  <g id="s6" opacity="0">
    <g class="c-teal">
      <rect x="200" y="163" width="160" height="58" rx="8" stroke-width="0.5"/>
      <text class="th" x="280" y="192" text-anchor="middle" dominant-baseline="central">Model evaluation</text>
    </g>
    <line x1="360" y1="192" x2="418" y2="192"
          stroke="var(--color-text-secondary)" stroke-width="1.5"
          marker-end="url(#arrow)"/>
  </g>

  <!-- ── STEP 7: Performance indicators box ── -->
  <g id="s7" opacity="0">
    <g class="c-gray">
      <rect x="420" y="163" width="140" height="58" rx="8" stroke-width="0.5"/>
      <text class="th" x="490" y="185" text-anchor="middle" dominant-baseline="central">Performance</text>
      <text class="th" x="490" y="201" text-anchor="middle" dominant-baseline="central">indicators</text>
    </g>
  </g>

  <!-- ── STEP 8: divider + inference label ── -->
  <g id="s8" opacity="0">
    <line x1="60" y1="295" x2="620" y2="295"
          stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    <text class="ts" x="340" y="312" text-anchor="middle" dominant-baseline="central">
      Inference (deployment)
    </text>
  </g>

  <!-- ── STEP 9: real-world data label ── -->
  <g id="s9" opacity="0">
    <text class="ts" x="80" y="390" text-anchor="middle" dominant-baseline="central">Real-world data</text>
    <text class="ts" x="80" y="406" text-anchor="middle" dominant-baseline="central">(records or prompts)</text>
    <line x1="130" y1="398" x2="178" y2="398"
          stroke="var(--color-text-secondary)" stroke-width="1.5"
          marker-end="url(#arrow)"/>
  </g>

  <!-- ── STEP 10: Application + embedded Model box ── -->
  <g id="s10" opacity="0">
    <g class="c-coral">
      <rect x="180" y="345" width="260" height="106" rx="12" stroke-width="0.5"/>
      <text class="th" x="310" y="370" text-anchor="middle" dominant-baseline="central">Application</text>
    </g>
    <g class="c-gray">
      <rect x="250" y="385" width="120" height="46" rx="8" stroke-width="0.5"/>
      <text class="th" x="310" y="408" text-anchor="middle" dominant-baseline="central">Model</text>
    </g>
    <line x1="440" y1="398" x2="498" y2="398"
          stroke="var(--color-text-secondary)" stroke-width="1.5"
          marker-end="url(#arrow)"/>
  </g>

  <!-- ── STEP 11: Output box ── -->
  <g id="s11" opacity="0">
    <g class="c-gray">
      <rect x="500" y="363" width="120" height="70" rx="8" stroke-width="0.5"/>
      <text class="th" x="560" y="389" text-anchor="middle" dominant-baseline="central">Output</text>
      <text class="ts" x="560" y="407" text-anchor="middle" dominant-baseline="central">(prediction or</text>
      <text class="ts" x="560" y="421" text-anchor="middle" dominant-baseline="central">prompt response)</text>
    </g>
  </g>

</svg>

<script>
const STEPS = [
  { id: 's0',  label: 'The training loop' },
  { id: 's1',  label: 'Training data goes in…' },
  { id: 's2',  label: '…trains the model…' },
  { id: 's3',  label: '…and produces a model' },
  { id: 's4',  label: 'That model feeds back in for evaluation' },
  { id: 's5',  label: 'Test data + model go to evaluation' },
  { id: 's6',  label: 'Model evaluation runs…' },
  { id: 's7',  label: '…producing performance indicators' },
  { id: 's8',  label: 'Once trained: inference' },
  { id: 's9',  label: 'Real-world data arrives…' },
  { id: 's10', label: '…enters the application with the model…' },
  { id: 's11', label: '…and output is produced' },
];

let current = 0;

function render() {
  STEPS.forEach((s, i) => {
    const el = document.getElementById(s.id);
    if (!el) return;
    el.style.opacity    = i <= current ? '1' : '0';
    el.style.transition = 'opacity 0.3s ease';
    if (i === current) {
      el.classList.add('fade-in');
      setTimeout(() => el.classList.remove('fade-in'), 400);
    }
  });
  document.getElementById('step-label').textContent   = STEPS[current].label;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === STEPS.length - 1;
  document.getElementById('progress').innerHTML = STEPS.map((_, i) =>
    `<span class="step-dot ${i === current ? 'active' : ''}"></span>`
  ).join('');
}

function go(dir) {
  current = Math.max(0, Math.min(STEPS.length - 1, current + dir));
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

render();
</script>
</body>
</html>
